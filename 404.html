<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EveryVoyage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFECD2;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 24px;
    }
    .stores {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stores a {
      display: inline-block;
    }
    .stores img {
      height: 44px;
    }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;
      var deepLinkRoutes = ['/follow/', '/trip/', '/moment/'];
      var matched = deepLinkRoutes.find(function (route) {
        return path.startsWith(route);
      });

      if (matched) {
        var id = path.replace(matched, '').replace(/\/$/, '');
        if (id) {
          var type = matched.replace(/\//g, '');
          var customSchemeUrl = 'everyvoyage://' + type + '/' + id;

          // Try to open the app via custom scheme
          window.location.href = customSchemeUrl;

          // If still here after a delay, the app isn't installed — stay on this page
          // which shows store links
        }
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <img src="/assets/icons/favicon.png" alt="EveryVoyage" class="logo">
    <h1>Opening EveryVoyage...</h1>
    <p>If the app doesn't open, download it below.</p>
    <div class="stores">
      <a href="https://apps.apple.com/app/everyvoyage/id6740091218">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.everyvoyage.app">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</body>
</html>
