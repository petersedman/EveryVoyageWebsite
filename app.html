<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <!-- Icons -->
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
  <link rel="apple-touch-icon" href="assets/icons/favicon.png">
  <meta name="theme-color" content="#f54a00">
  <meta name="msapplication-TileColor" content="#f54a00">
  
  <!-- Open Graph -->
  <meta property="og:url" content="https://everyvoyage.com/app">
  <meta property="og:title" content="Download EveryVoyage">
  <meta property="og:description" content="Track your motorhome journeys, capture memories, and relive every trip. Free on iOS & Android.">
  <meta property="og:image" content="https://everyvoyage.com/assets/img/AppPreview.webp">
  <meta property="og:image:width" content="1200">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Download EveryVoyage">
  <meta name="twitter:description" content="Track your motorhome journeys, capture memories, and relive every trip. Free on iOS & Android.">
  <meta name="twitter:image" content="https://everyvoyage.com/assets/img/AppPreview.webp">

  <script>
    (function () {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      const IOS_URL = "https://apps.apple.com/app/id6755696102";
      const ANDROID_URL = "https://play.google.com/store/apps/details?id=com.everyvoyage.app";
      const FALLBACK_URL = "https://everyvoyage.com/";

      const isAndroid = /android/i.test(ua);
      const isIOS = /iPad|iPhone|iPod/.test(ua)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isAndroid) {
        window.location.replace(ANDROID_URL);
      } else if (isIOS) {
        window.location.replace(IOS_URL);
      } else {
        window.location.replace(FALLBACK_URL);
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://everyvoyage.com/">
  </noscript>
</head>
